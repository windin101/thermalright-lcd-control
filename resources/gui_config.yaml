paths:
  themes_dir: "./resources/themes/presets"
  backgrounds_dir: "./resources/themes/backgrounds"
  foregrounds_dir: "./resources/themes/foregrounds"
  service_config: "./resources/config"

# Startup theme mode: "default", "random", or "last_modified"
# - default: Load the theme specified in default_theme
# - random: Load a random theme from the themes folder
# - last_modified: Load the most recently modified theme
startup_theme_mode: "default"

# Default theme to load on startup (filename only, e.g., "config_1.yaml")
# Only used when startup_theme_mode is "default"
# If file not found, falls back to last_modified behavior
default_theme: "config_1.yaml"

window:
  default_width: 1920
  default_height: 1080
  min_width: 800
  min_height: 600

supported_formats:
  images: [ '.jpg', '.jpeg', '.png', '.bmp', '.tiff', '.webp' ]
  videos: [ '.mp4', '.avi', '.mkv', '.mov', '.webm', '.flv', '.wmv', '.m4v' ]
  gifs: [ '.gif' ]
